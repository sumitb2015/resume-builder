    <!-- Structured Data: FAQ (enables People Also Ask rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does the AI resume builder work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BespokeCV uses AI to generate powerful, metrics-driven bullet points, write professional summaries, and rewrite your resume to match specific job descriptions. Enter your experience, choose from 40+ professional templates, let AI enhance your content, then download a pixel-perfect PDF in one click."
          }
        },
        {
          "@type": "Question",
          "name": "What is an ATS-optimized resume?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An ATS (Applicant Tracking System) optimized resume passes the automated screening software that 98% of large companies use. BespokeCV scores your resume 0-100 for ATS compatibility and tells you exactly which keywords you're missing so recruiters actually see your application."
          }
        },
        {
          "@type": "Question",
          "name": "How many resume templates does BespokeCV offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BespokeCV offers 40+ professional resume templates spanning modern, executive, creative, and technical styles. All templates are ATS-friendly, fully customizable with color and style options, and export as pixel-perfect A4 PDFs."
          }
        },
        {
          "@type": "Question",
          "name": "Can I import my LinkedIn profile to create a resume?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. With the Ultimate plan, paste your LinkedIn profile text into BespokeCV and AI automatically parses and structures it into a complete resume ready for editing, template selection, and PDF export."
          }
        },
        {
          "@type": "Question",
          "name": "Can I upload an existing PDF or Word resume?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the Ultimate plan supports PDF and DOCX resume import. BespokeCV's AI parses your existing resume, suggests specific improvements, and lets you enhance it with professional templates and AI writing tools."
          }
        },
        {
          "@type": "Question",
          "name": "What is the job tailoring feature?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Job tailoring lets you paste any job description and AI rewrites your resume bullets and summary to match the exact language and keywords the employer is looking for. Before/after diff review shows you every change made."
          }
        },
        {
          "@type": "Question",
          "name": "How much does BespokeCV cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BespokeCV offers three plans: Basic for a 14-day trial, Pro with full AI writing tools, and Ultimate with job tailoring and resume import. No long-term contracts — cancel anytime."
          }
        }
      ]
    }
    </script>
