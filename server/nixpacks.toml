# Required system packages for Puppeteer (headless Chrome)
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "atk",
  "cups",
  "pango",
  "alsa-lib",
  "gtk3",
  "at-spi2-atk",
  "libdrm",
  "mesa",
  "expat",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/run/current-system/sw/bin/chromium"
